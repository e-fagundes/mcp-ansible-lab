global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "queue"
    metrics_path: /metrics
    static_configs:
      - targets: ["queue:8000"]

  - job_name: "worker"
    metrics_path: /metrics
    static_configs:
      - targets: ["worker:9000"]

  - job_name: "agent"
    metrics_path: /metrics
    static_configs:
      - targets: ["agent:8081"]
